services:
  backend-go:
    build: .
    container_name: go_api_dakota
    #network_mode: "host"
    image: dakota-backend-image
    ports:
      - "9090:8080"
    environment:
      - TZ=Asia/Jakarta
      - GODEBUG=tlsrsakex=1,tls10default=1
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: always
